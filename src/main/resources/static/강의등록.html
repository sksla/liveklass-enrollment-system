<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>강의 관리</title>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
    />

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>

    <style>
      body {
        background-color: #f5f6f8;
      }

      .wrap {
        width: 1200px;
        margin: auto;
        padding: 40px 0px;
      }

      .page-title {
        margin-bottom: 30px;
      }

      .card-area {
        background: white;
        padding: 25px;
        border-radius: 10px;
        margin-bottom: 25px;
      }

      .status-badge {
        padding: 5px 10px;
        border-radius: 5px;
        color: white;
        font-size: 13px;
      }

      .draft {
        background: gray;
      }

      .open {
        background: #28a745;
      }

      .closed {
        background: #dc3545;
      }

      .table td,
      .table th {
        vertical-align: middle;
      }

      textarea {
        resize: none;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <!-- 제목 -->
      <div class="page-title d-flex justify-content-between align-items-center">
        <h2>강의 관리</h2>

        <a href="#" class="btn btn-outline-dark"> 메인으로 </a>
      </div>

      <!-- 강의 등록 -->
      <div class="card-area">
        <h4 class="mb-4">강의 등록</h4>

        <form>
          <div class="form-group">
            <label>강의 제목</label>
            <input type="text" class="form-control" />
          </div>

          <div class="form-group">
            <label>강의 설명</label>
            <textarea class="form-control" rows="4"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group col-md-4">
              <label>가격</label>
              <input type="number" class="form-control" />
            </div>

            <div class="form-group col-md-4">
              <label>최대 정원</label>
              <input type="number" class="form-control" />
            </div>

            <div class="form-group col-md-4">
              <label>강의 상태</label>

              <select class="form-control">
                <option>초안</option>
                <option>모집</option>
                <option>모집마감</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group col-md-6">
              <label>수강 시작일</label>
              <input type="date" class="form-control" />
            </div>

            <div class="form-group col-md-6">
              <label>수강 종료일</label>
              <input type="date" class="form-control" />
            </div>
          </div>

          <div class="text-right">
            <button type="submit" class="btn btn-primary">강의 등록</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
