<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>강의 관리</title>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
    />

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>

    <style>
      body {
        background-color: #f5f6f8;
      }

      .wrap {
        width: 1200px;
        margin: auto;
        padding: 40px 0px;
      }

      .page-title {
        margin-bottom: 30px;
      }

      .card-area {
        background: white;
        padding: 25px;
        border-radius: 10px;
        margin-bottom: 25px;
      }

      .status-badge {
        padding: 5px 10px;
        border-radius: 5px;
        color: white;
        font-size: 13px;
      }

      .draft {
        background: gray;
      }

      .open {
        background: #28a745;
      }

      .closed {
        background: #dc3545;
      }

      .table td,
      .table th {
        vertical-align: middle;
      }

      textarea {
        resize: none;
      }

      .table-scroll {
        max-height: 350px;
        overflow-y: auto;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <!-- 제목 -->
      <div class="page-title d-flex justify-content-between align-items-center">
        <h2>강의 상세 조회</h2>

        <a href="#" class="btn btn-outline-dark"> 메인으로 </a>
      </div>

      <!-- 강의 상세조회 -->
      <div class="card-area">
        <h4 class="mb-4">강의 상세조회</h4>

        <form>
          <div class="form-group">
            <label>강의 제목</label>
            <input
              type="text"
              class="form-control"
              value="안녕하세요"
              disabled
            />
          </div>

          <div class="form-group">
            <label>강의 설명</label>
            <textarea class="form-control" rows="4" disabled>.</textarea>
          </div>

          <div class="form-row">
            <div class="form-group col-md-4">
              <label>가격</label>
              <input type="number" class="form-control" disabled />
            </div>

            <div class="form-group col-md-4">
              <label>최대 정원</label>
              <input type="number" class="form-control" disabled />
            </div>

            <div class="form-group col-md-4">
              <label>강의 상태</label>

              <select class="form-control">
                <option>초안</option>
                <option>모집</option>
                <option>모집마감</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group col-md-6">
              <label>수강 시작일</label>
              <input type="date" class="form-control" disabled />
            </div>

            <div class="form-group col-md-6">
              <label>수강 종료일</label>
              <input type="date" class="form-control" disabled />
            </div>
          </div>
          <div class="text-right">
            <button type="submit" class="btn btn-primary">강의 수정</button>
          </div>
        </form>
      </div>

      <!-- 수강생 목록 -->
      <div class="card-area">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4>수강생 목록</h4>

          <span>
            현재 신청 인원 :
            <strong>10 / 30</strong>
          </span>
        </div>

        <!-- 스크롤 영역 -->
        <div class="table-scroll">
          <table class="table">
            <thead class="thead-light">
              <tr>
                <th width="50%">이름</th>
                <th width="50%">신청일</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>김철수</td>

                <td>2026-05-22 13:20</td>
              </tr>

              <tr>
                <td>이영희</td>

                <td>2026-05-22 14:10</td>
              </tr>

              <!-- 데이터 계속 추가 -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
